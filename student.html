<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhysicsBoard Student</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .controls {
            margin-bottom: 12px;
        }

        input {
            padding: 6px;
            margin-right: 8px;
            width: 220px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        #status {
            margin: 10px 0;
            font-weight: bold;
        }

        canvas {
            border: 1px solid #888;
            background: white;
            touch-action: none;
        }
    </style>
</head>
<body>
    <h2>PhysicsBoard Student</h2>

    <div class="controls">
        <input id="wsUrl" type="text" value="ws://localhost:9082/ws" />
        <button id="connectBtn">Connect</button>
    </div>

    <div id="status">Disconnected</div>

    <canvas id="board" width="1200" height="800"></canvas>

    <script>
    const wsUrlInput = document.getElementById("wsUrl");
    const connectBtn = document.getElementById("connectBtn");
    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    let ws = null;
    let drawing = false;
    let currentStroke = null;
    let allStrokes = [];
    let drawAllowed = true;

    function setStatus(text, color = "black") {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function drawStroke(stroke) {
      if (!stroke || !stroke.points || stroke.points.length === 0) return;

      ctx.strokeStyle = "#000000";
      ctx.lineWidth = stroke.thickness || 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (stroke.points.length === 1) {
        const p = stroke.points[0];
        ctx.beginPath();
        ctx.arc(p.x, p.y, (stroke.thickness || 2) / 2, 0, Math.PI * 2);
        ctx.fillStyle = "#000000";
        ctx.fill();
        return;
      }

      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i = 1; i < stroke.points.length; i++) {
        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      }
      ctx.stroke();
    }

    function redrawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const stroke of allStrokes) {
        drawStroke(stroke);
      }
    }

    function getCanvasPos(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    connectBtn.addEventListener("click", () => {
      if (ws) {
        ws.close();
      }

      const url = wsUrlInput.value.trim();
      ws = new WebSocket(url);

      ws.onopen = () => {
        setStatus("Connected", "green");
      };

      ws.onclose = () => {
        setStatus("Disconnected", "red");
      };

      ws.onerror = () => {
        setStatus("Connection error", "red");
      };

      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);

          if (msg.type === "board" && Array.isArray(msg.strokes)) {
            allStrokes = msg.strokes;
            redrawBoard();
          } else if (msg.type === "stroke" && msg.stroke) {
            allStrokes.push(msg.stroke);
            redrawBoard();
          } else if (msg.type === "permission") {
            drawAllowed = !!msg.allowed;
            setStatus(drawAllowed ? "Connected (drawing allowed)" : "Connected (read-only)", drawAllowed ? "green" : "orange");
          }
        } catch (err) {
          console.error("Failed to parse message:", err);
        }
      };
    });

    canvas.addEventListener("mousedown", (evt) => {
      if (!ws || ws.readyState !== WebSocket.OPEN || !drawAllowed) return;

      drawing = true;
      const p = getCanvasPos(evt);
      currentStroke = {
        tool: 0,
        points: [p],
        color: 4278190080,
        thickness: 2,
        text: ""
      };
    });

    canvas.addEventListener("mousemove", (evt) => {
      if (!drawing || !currentStroke) return;

      const p = getCanvasPos(evt);
      currentStroke.points.push(p);

      redrawBoard();
      drawStroke(currentStroke);
    });

    canvas.addEventListener("mouseup", () => {
      if (!drawing || !currentStroke) return;

      drawing = false;

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: "stroke",
          stroke: currentStroke
        }));
      }

      currentStroke = null;
    });

    canvas.addEventListener("mouseleave", () => {
      if (drawing) {
        drawing = false;
        currentStroke = null;
      }
    });
    </script>
</body>
</html>
